<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Map Game - An Interactive World</title>
<link id="leaflet-css" rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #bfefff; overflow: hidden; }
  #map { background: radial-gradient(circle at 50% 43%, #e5fbff 0%, #bfefff 54%, #a7e2f5 100%); }
  .leaflet-container { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: transparent; }
  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom a { background: rgba(255,255,255,0.94); border-bottom: 1px solid rgba(0,0,0,0.18); color: #111; font-weight: 700; }
  .leaflet-control-zoom a:hover { background: white; }
  .leaflet-interactive { cursor: pointer; }
  .country-popup .leaflet-popup-content-wrapper { border-radius: 14px; box-shadow: 0 10px 28px rgba(0,0,0,.28); cursor: pointer; }
  .country-popup .leaflet-popup-content { margin: 0; min-width: 210px; }
  .country-popup .leaflet-popup-close-button { display: none; }
  .popup-card { padding: 14px 16px 13px; line-height: 1.25; }
  .popup-country { font-size: 20px; font-weight: 850; color: #152036; margin-bottom: 8px; }
  .popup-capital { font-size: 14px; color: #334057; margin-bottom: 3px; }
  .popup-extra { font-size: 12px; color: #69758a; margin-top: 6px; }
  .leaflet-popup-tip { box-shadow: 0 8px 26px rgba(0,0,0,.20); }
  .island-helper { filter: drop-shadow(0 0 2px rgba(0,0,0,.45)); cursor: pointer; }

  .quiz-control {
    background: rgba(255,255,255,0.96);
    color: #172033;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,.22);
    padding: 8px 9px;
    width: 164px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    user-select: none;
  }
  .quiz-control-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .quiz-control-title {
    font-weight: 850;
    font-size: 13px;
    margin: 0;
    letter-spacing: .01em;
  }
  .quiz-collapse-btn {
    width: 24px;
    height: 22px;
    border: 1px solid rgba(23,32,51,.18);
    border-radius: 7px;
    background: rgba(245,248,255,.92);
    color: #172033;
    font-size: 16px;
    font-weight: 850;
    line-height: 18px;
    cursor: pointer;
    padding: 0;
  }
  .quiz-collapse-btn:hover { background: white; }
  .quiz-control.collapsed { width: auto; min-width: 0; padding: 7px 8px; }
  .quiz-control.collapsed .quiz-control-body { display: none; }
  .quiz-control.collapsed .quiz-control-title { font-size: 12px; }
  .quiz-toggle-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    line-height: 1.2;
    cursor: pointer;
  }
  .quiz-toggle-row input { width: 16px; height: 16px; margin: 0; cursor: pointer; }
  .quiz-control-note {
    margin-top: 7px;
    font-size: 11px;
    color: #62708a;
    line-height: 1.25;
  }

  .mode-click-instruction {
    margin: 7px 0 8px;
    padding: 6px 7px;
    border-radius: 8px;
    background: rgba(239,244,255,.92);
    color: #4b5870;
    font-size: 11px;
    line-height: 1.25;
    font-weight: 650;
  }

  .water-label-marker {
    pointer-events: none;
    user-select: none;
  }
  .water-label-inner {
    display: inline-block;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    white-space: nowrap;
    text-align: center;
    font-family: "Trebuchet MS", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-weight: 800;
    line-height: 1.02;
    letter-spacing: .052em;
    text-transform: uppercase;
    color: rgba(13, 79, 128, .32);
    text-shadow: 0 1px 3px rgba(255,255,255,.48);
    opacity: .66;
  }
  .water-label-ocean .water-label-inner { font-size: 18px; letter-spacing: .078em; color: rgba(8, 70, 119, .30); }
  .water-label-major .water-label-inner { font-size: 15px; }
  .water-label-medium .water-label-inner { font-size: 12.5px; letter-spacing: .045em; }
  .water-label-small .water-label-inner { font-size: 11px; letter-spacing: .035em; }

  .country-label {
    display: inline-block;
    pointer-events: none;
    transform: translate(-50%, -50%);
    text-align: center;
    white-space: nowrap;
    line-height: 1.08;
    color: #07111f;
    text-shadow: -1px -1px 0 rgba(255,255,255,.88), 1px -1px 0 rgba(255,255,255,.88), -1px 1px 0 rgba(255,255,255,.88), 1px 1px 0 rgba(255,255,255,.88), 0 2px 4px rgba(255,255,255,.65);
  }
  .country-label-name {
    display: block;
    font-size: 12px;
    font-weight: 850;
    letter-spacing: .005em;
  }
  .country-label-capital {
    display: block;
    font-size: 9px;
    font-weight: 650;
    opacity: .86;
    margin-top: 1px;
  }
  .label-micro .country-label-name, .label-tiny .country-label-name { font-size: 11px; }
  .label-micro .country-label-capital, .label-tiny .country-label-capital { font-size: 8px; }
  .label-territory .country-label-name { font-size: 11px; font-style: italic; }
  .capital-city-marker {
    pointer-events: none;
    user-select: none;
  }
  .capital-city-label {
    position: relative;
    display: block;
    width: 0;
    height: 0;
    white-space: nowrap;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  .capital-city-dot {
    position: absolute;
    left: 0;
    top: 0;
    transform: translate(-50%, -50%);
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: #101827;
    border: 2px solid rgba(255,255,255,.96);
    box-shadow: 0 1px 5px rgba(0,0,0,.35);
  }
  .capital-city-text {
    position: absolute;
    left: 10px;
    top: 0;
    transform: translateY(-50%);
    display: inline-block;
    padding: 3px 6px 4px;
    border-radius: 8px;
    background: rgba(255,255,255,.92);
    border: 1px solid rgba(16,24,39,.14);
    box-shadow: 0 3px 10px rgba(0,0,0,.16);
    color: #101827;
    line-height: 1.05;
    text-align: left;
  }
  /* Declutter placements — the dot never moves; only the text shifts to an
     adjacent side. Offsets must mirror capitalLabelRect() in the script. */
  .capital-city-label[data-place="left"] .capital-city-text { left: auto; right: 10px; top: 0; bottom: auto; transform: translateY(-50%); }
  .capital-city-label[data-place="top"] .capital-city-text { left: 0; right: auto; top: auto; bottom: 10px; transform: translateX(-50%); }
  .capital-city-label[data-place="bottom"] .capital-city-text { left: 0; right: auto; top: 10px; bottom: auto; transform: translateX(-50%); }
  .capital-city-label[data-place="top-right"] .capital-city-text { left: 8px; right: auto; top: auto; bottom: 8px; transform: none; }
  .capital-city-label[data-place="top-left"] .capital-city-text { left: auto; right: 8px; top: auto; bottom: 8px; transform: none; }
  .capital-city-label[data-place="bottom-right"] .capital-city-text { left: 8px; right: auto; top: 8px; bottom: auto; transform: none; }
  .capital-city-label[data-place="bottom-left"] .capital-city-text { left: auto; right: 8px; top: 8px; bottom: auto; transform: none; }
  .capital-city-name {
    display: block;
    font-size: 10.5px;
    font-weight: 900;
  }
  .capital-country-name {
    display: block;
    margin-top: 1px;
    font-size: 8px;
    font-weight: 750;
    color: #52617a;
  }
  .capital-toggle-btn.active {
    background: #172033;
    color: white;
    border-color: #172033;
  }
  .capital-toggle-btn:disabled {
    opacity: .52;
    cursor: not-allowed;
  }
  #hover-label {
    display: none;
    position: fixed;
    z-index: 10000;
    pointer-events: none;
    max-width: 260px;
    padding: 7px 9px;
    border: 1px solid rgba(16,24,39,.18);
    border-radius: 11px;
    background: rgba(255,255,255,.96);
    box-shadow: 0 8px 22px rgba(0,0,0,.22);
  }
  #hover-label .country-label { transform: none; text-align: left; }
  #hover-label .country-label-name { font-size: 13px; }
  #hover-label .country-label-capital { font-size: 10px; }
  #hover-label .state-label-nickname { font-size: 9px; }

  .quiz-start-btn, .quiz-mini-btn, .quiz-choice-btn, .quiz-review-row {
    border: 1px solid rgba(23,32,51,.17);
    border-radius: 10px;
    background: rgba(245,248,255,.96);
    color: #172033;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 1px 0 rgba(255,255,255,.8) inset;
  }
  .quiz-start-btn { width: 100%; margin-top: 5px; padding: 7px 8px; font-size: 12px; }
  .quiz-start-btn:hover, .quiz-mini-btn:hover, .quiz-choice-btn:hover { background: white; }
  #quiz-game-panel {
    display: none;
    position: absolute;
    z-index: 980;
    left: 14px;
    top: 92px;
    width: min(180px, calc(100vw - 28px));
    background: rgba(255,255,255,.97);
    color: #172033;
    border-radius: 16px;
    box-shadow: 0 12px 34px rgba(0,0,0,.26);
    padding: 10px 10px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    user-select: none;
  }
  #quiz-game-panel.active { display: block; }
  .quiz-game-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
  .quiz-game-title { font-size: 12px; font-weight: 900; color: #52617a; text-transform: uppercase; letter-spacing: .04em; }
  .quiz-progress { font-size: 11px; font-weight: 850; color: #172033; white-space: nowrap; }
  .quiz-question { font-size: 15px; line-height: 1.18; font-weight: 900; color: #121a2b; margin: 8px 0 10px; }
  .quiz-instruction { font-size: 12px; line-height: 1.32; color: #5a667a; margin: -4px 0 9px; }
  .quiz-options { display: grid; gap: 7px; max-height: 42vh; overflow-y: auto; }
  .quiz-choice-btn { padding: 7px 8px; text-align: left; font-size: 12px; line-height: 1.22; }
  .quiz-choice-btn.correct { border-color: rgba(22,130,76,.42); background: rgba(219, 255, 234, .96); color: #0f5b37; }
  .quiz-choice-btn.wrong { border-color: rgba(186,56,63,.42); background: rgba(255, 231, 233, .96); color: #8b1f2b; }
  .quiz-feedback { min-height: 19px; margin-top: 9px; font-size: 13px; font-weight: 850; color: #52617a; }
  .quiz-feedback.good { color: #0f7042; }
  .quiz-feedback.bad { color: #9b2430; }
  .quiz-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 9px; }
  .quiz-mini-btn { padding: 6px 9px; font-size: 12px; }
  .quiz-mini-btn.primary { background: #172033; color: white; border-color: #172033; }
  .quiz-mini-btn.primary:hover { background: #26324b; }
  .quiz-review-title { font-size: 10px; font-weight: 850; text-transform: uppercase; letter-spacing: .045em; color: #52617a; margin-top: 2px; }
  .quiz-review-row { padding: 6px 8px; text-align: left; font-size: 12px; line-height: 1.22; display: block; width: 100%; border-color: rgba(186,56,63,.30); background: rgba(255, 240, 241, .96); }
  .quiz-review-row:hover { background: rgba(255, 231, 233, .98); }
  .quiz-review-name { font-weight: 850; color: #8b1f2b; display: block; }
  .quiz-review-sub { display: block; font-size: 11px; color: #5a667a; margin-top: 1px; }
  .quiz-scoreline { margin-top: 8px; font-size: 13px; font-weight: 850; color: #172033; }
  .quiz-correct-flash { animation: quizFlashGood .75s ease-out 1; }
  .quiz-wrong-flash { animation: quizFlashBad .75s ease-out 1; }
  @keyframes quizFlashGood { 0% { box-shadow: 0 0 0 0 rgba(30,170,94,.55); } 100% { box-shadow: 0 0 0 16px rgba(30,170,94,0); } }
  @keyframes quizFlashBad { 0% { box-shadow: 0 0 0 0 rgba(200,55,65,.50); } 100% { box-shadow: 0 0 0 16px rgba(200,55,65,0); } }

  .quiz-section-title {
    font-size: 10px;
    font-weight: 850;
    text-transform: uppercase;
    letter-spacing: .045em;
    color: #52617a;
    margin: 8px 0 5px;
  }
  .quiz-mode-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    line-height: 1.22;
    cursor: pointer;
    margin: 4px 0;
  }
  .quiz-mode-row input { width: 15px; height: 15px; margin: 0; cursor: pointer; }
  .quiz-mode-row.deferred-loading { opacity: .52; cursor: wait; }
  .quiz-mode-row.deferred-loading input { cursor: wait; }
  .state-label .country-label-name { font-size: 12px; }
  .state-label .country-label-capital { font-size: 9px; }
  .state-label-nickname {
    display: block;
    font-size: 8px;
    font-weight: 650;
    opacity: .82;
    margin-top: 1px;
  }
  .ireland-label .country-label-name { font-size: 13px; }
  .ireland-label .country-label-capital { font-size: 10px; }
  .britain-label .country-label-name { font-size: 12px; }
  .britain-label .country-label-capital { font-size: 9px; }
  .state-popup .leaflet-popup-content-wrapper,
  .ireland-popup .leaflet-popup-content-wrapper,
  .britain-popup .leaflet-popup-content-wrapper { border-radius: 14px; box-shadow: 0 10px 28px rgba(0,0,0,.28); cursor: pointer; }
  .state-popup .leaflet-popup-content,
  .ireland-popup .leaflet-popup-content,
  .britain-popup .leaflet-popup-content { margin: 0; min-width: 230px; }
  .state-popup .leaflet-popup-close-button,
  .ireland-popup .leaflet-popup-close-button,
  .britain-popup .leaflet-popup-close-button { display: none; }
  @media (max-width: 680px) { .quiz-control { width: 152px; padding: 7px 8px; } .quiz-control.collapsed { width: auto; } #quiz-game-panel { top: 88px; width: min(180px, calc(100vw - 28px)); } }


  #intro-overlay {
    position: fixed;
    inset: 0;
    z-index: 50000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
    box-sizing: border-box;
    background:
      radial-gradient(circle at 20% 18%, rgba(255,255,255,.88) 0 0.7rem, transparent 0.75rem),
      radial-gradient(circle at 84% 28%, rgba(255,255,255,.78) 0 0.5rem, transparent 0.55rem),
      radial-gradient(circle at 74% 78%, rgba(255,255,255,.72) 0 0.85rem, transparent 0.9rem),
      linear-gradient(135deg, rgba(11,105,148,.54), rgba(63,152,104,.48), rgba(255,190,77,.42));
    backdrop-filter: blur(4px);
  }
  #intro-overlay.intro-hidden { display: none; }
  .intro-card {
    width: min(520px, calc(100vw - 44px));
    text-align: center;
    padding: 28px 26px 26px;
    border-radius: 30px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.98), rgba(245,250,255,.96));
    color: #172033;
    box-shadow: 0 22px 60px rgba(0,0,0,.30), 0 0 0 6px rgba(255,255,255,.36);
    border: 3px solid rgba(23,32,51,.12);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .intro-card::before,
  .intro-card::after {
    content: "";
    position: absolute;
    border-radius: 999px;
    background: rgba(255,211,79,.38);
    pointer-events: none;
  }
  .intro-card::before { width: 120px; height: 120px; left: -42px; top: -44px; }
  .intro-card::after { width: 96px; height: 96px; right: -34px; bottom: -36px; background: rgba(55,170,105,.28); }
  .intro-globe {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 6px;
    filter: drop-shadow(0 5px 4px rgba(0,0,0,.13));
  }
  .intro-title {
    margin: 0;
    font-size: clamp(38px, 8vw, 68px);
    line-height: .92;
    font-weight: 950;
    letter-spacing: -0.055em;
    color: #102443;
    text-shadow: 0 3px 0 rgba(255,210,82,.75);
  }
  .intro-subtext {
    margin: 18px auto 22px;
    max-width: 410px;
    font-size: clamp(17px, 3.2vw, 22px);
    line-height: 1.28;
    color: #40506a;
    font-weight: 750;
  }
  #intro-let-go {
    appearance: none;
    border: 0;
    border-radius: 999px;
    padding: 13px 25px 14px;
    background: linear-gradient(180deg, #ffcf53, #f4a825);
    color: #172033;
    font-size: 19px;
    font-weight: 950;
    cursor: pointer;
    box-shadow: 0 7px 0 #bf7610, 0 13px 24px rgba(0,0,0,.22);
    transform: translateY(0);
  }
  #intro-let-go:hover { transform: translateY(-1px); box-shadow: 0 8px 0 #bf7610, 0 15px 26px rgba(0,0,0,.24); }
  #intro-let-go:active { transform: translateY(4px); box-shadow: 0 3px 0 #bf7610, 0 8px 16px rgba(0,0,0,.20); }
  #intro-let-go:focus-visible { outline: 4px solid rgba(23,32,51,.28); outline-offset: 4px; }
  .intro-load-note {
    margin: 16px 0 0;
    font-size: 12px;
    line-height: 1.25;
    color: #66738a;
    font-weight: 650;
  }
  @media (max-width: 520px) {
    .intro-card { padding: 23px 19px 22px; border-radius: 24px; }
    .intro-globe { font-size: 40px; }
    #intro-let-go { width: 100%; }
  }


  .country-info-widget {
    position: absolute;
    z-index: 970;
    right: 14px;
    bottom: 14px;
    width: min(292px, calc(100vw - 28px));
    max-height: min(68vh, 520px);
    background: rgba(255,255,255,.96);
    color: #172033;
    border: 1px solid rgba(23,32,51,.12);
    border-radius: 17px;
    box-shadow: 0 12px 34px rgba(0,0,0,.24);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  .country-info-widget.collapsed { width: min(260px, calc(100vw - 28px)); }
  .country-info-toggle {
    width: 100%;
    appearance: none;
    border: 0;
    background: linear-gradient(180deg, rgba(245,248,255,.98), rgba(233,241,255,.96));
    color: #172033;
    cursor: pointer;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.25;
    font-weight: 850;
    text-align: left;
  }
  .country-info-toggle:hover { background: white; }
  .country-info-body {
    display: block;

  .country-info-widget.collapsed .country-info-body { display: none; }
  .country-info-title {
    margin: 0 0 8px;
    font-size: 18px;
    line-height: 1.08;
    font-weight: 950;
    color: #102443;
  }
  .country-info-note {

    line-height: 1.28;

  }
  .country-info-card + .country-info-card { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(23,32,51,.10); }
  .country-info-subtitle {
    margin: 0 0 7px;

  }
  .country-info-facts {
    display: grid;

  }
  .country-info-facts dt {
    margin: 0;
    color: #69758a;
    font-weight: 800;
  }
  .country-info-facts dd {
    margin: 0;
    color: #172033;

  }
  @media (max-width: 680px) { .country-info-widget { right: 10px; bottom: 10px; width: min(275px, calc(100vw - 20px)); } .country-info-widget.collapsed { width: min(245px, calc(100vw - 20px)); } }



  #deferred-loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 22px;
    box-sizing: border-box;
    background: rgba(255,255,255,.10);
    pointer-events: auto;
  }
  #deferred-loading-overlay.active { display: flex; }
  .deferred-loading-card {
    min-width: min(280px, calc(100vw - 44px));
    padding: 20px 22px 19px;
    border-radius: 22px;
    text-align: center;
    background: rgba(255,255,255,.88);
    border: 1px solid rgba(23,32,51,.12);
    box-shadow: 0 18px 46px rgba(0,0,0,.24);
    color: #172033;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    backdrop-filter: blur(3px);
  }
  .deferred-loading-spinner {
    width: 42px;
    height: 42px;
    margin: 0 auto 12px;
    border-radius: 50%;
    border: 5px solid rgba(23,32,51,.14);
    border-top-color: rgba(21,114,161,.88);
    animation: spin 0.85s linear infinite;
  }
  .deferred-loading-word {
    font-size: 26px;
    line-height: 1;
    font-weight: 950;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .deferred-loading-detail {
    margin-top: 8px;

function setupInfoWidget() {

function infoClean(v) {
  const s = String(v ?? '').trim();
  return s && s !== '-99' && s !== '0' ? s : '';
}
function infoNumber(v) {
  const n = Number(v);
  if (!Number.isFinite(n) || n <= 0) return '';
  return Math.round(n).toLocaleString();
}
function addInfoFact(facts, label, value) {
  const cleaned = infoClean(value);
  if (cleaned) facts.push([label, cleaned]);
}
function infoCardsHtml(cards) {
  return (cards || []).map(function(card) {
    const facts = (card.facts || []).map(function(pair) {
      return `<dt>${esc(pair[0])}</dt><dd>${esc(pair[1])}</dd>`;
    }).join('');
    return `<section class="country-info-card"><h3 class="country-info-subtitle">${esc(card.title)}</h3><dl class="country-info-facts">${facts}</dl></section>`;
  }).join('');
}
function approximateFeatureAreaKm2(feature) {
  if (!feature || !feature.geometry) return '';
  const R = 6371.0088;
  function ringAreaKm2(ring) {
    if (!Array.isArray(ring) || ring.length < 3) return 0;
    let total = 0;
    for (let i = 0; i < ring.length; i++) {
      const p1 = ring[i], p2 = ring[(i + 1) % ring.length];
      if (!p1 || !p2) continue;
      const lon1 = Number(p1[0]) * Math.PI / 180;
      const lon2 = Number(p2[0]) * Math.PI / 180;
      const lat1 = Number(p1[1]) * Math.PI / 180;
      const lat2 = Number(p2[1]) * Math.PI / 180;
      if (![lon1, lon2, lat1, lat2].every(Number.isFinite)) continue;
      total += (lon2 - lon1) * (2 + Math.sin(lat1) + Math.sin(lat2));
    }
    return Math.abs(total * R * R / 2);
  }
  function polygonAreaKm2(poly) {
    if (!Array.isArray(poly) || !poly.length) return 0;
    const outer = ringAreaKm2(poly[0]);
    const holes = poly.slice(1).reduce((sum, ring) => sum + ringAreaKm2(ring), 0);
    return Math.max(0, outer - holes);
  }
  const g = feature.geometry;
  let area = 0;
  if (g.type === 'Polygon') area = polygonAreaKm2(g.coordinates);
  else if (g.type === 'MultiPolygon') area = (g.coordinates || []).reduce((sum, poly) => sum + polygonAreaKm2(poly), 0);
  if (!Number.isFinite(area) || area <= 0) return '';
  return Math.round(area);
}
function infoAreaValue(feature, p) {
  const raw = prop(p, ['AREA_KM2','area_km2','AREA','area']);
  const n = Number(raw);
  if (Number.isFinite(n) && n > 0) return Math.round(n);
  return approximateFeatureAreaKm2(feature);
}
function worldInfoRankKeysForFeature(feature) {
  const p = (feature && feature.properties) || {};
  const keys = [
    displayName(p), prop(p, ['QUIZ_DISPLAY_NAME']), prop(p, ['NAME_LONG']), prop(p, ['NAME_EN']), prop(p, ['NAME']),
    prop(p, ['ADMIN']), prop(p, ['GEOUNIT']), prop(p, ['SUBUNIT']),
    prop(p, ['ADM0_A3']), prop(p, ['ADM0_A3_US']), prop(p, ['SU_A3']), prop(p, ['GU_A3']), prop(p, ['SOV_A3']),
    prop(p, ['ISO_A2']), prop(p, ['ISO_A3']), prop(p, ['WB_A2']), prop(p, ['WB_A3'])
  ].map(norm).filter(Boolean);
  return Array.from(new Set(keys));
}
function formatWorldInfoRank(rankInfo) {
  if (!rankInfo || !rankInfo.rank) return '';
  return `${rankInfo.rank} of ${rankInfo.total}`;
}
function worldInfoRanksForFeature(feature) {
  for (const key of worldInfoRankKeysForFeature(feature)) {
    const ranks = worldInfoRankIndex.get(key);
    if (ranks) return ranks;
  }
  return {};
}
function rebuildWorldInfoRanks(extraFeatures=[]) {
  const rowsByKey = new Map();
  const candidates = [...(worldInfoBaseRankFeatures || []), ...(extraFeatures || [])];
  for (const feature of candidates) {
    if (!feature || !feature.geometry) continue;
    const p = feature.properties || {};
    const name = displayName(p);
    const mainKey = norm(name);
    if (!mainKey || mainKey === 'ANTARCTICA') continue;
    const population = Number(prop(p, ['POP_EST','pop_est','POP_MAX','pop_max']));
    const area = Number(infoAreaValue(feature, p));
    if (!Number.isFinite(population) && !Number.isFinite(area)) continue;
    const row = {
      feature,
      keys: worldInfoRankKeysForFeature(feature),
      population: Number.isFinite(population) && population > 0 ? population : null,
      area: Number.isFinite(area) && area > 0 ? area : null,
      populationRank: null,
      areaRank: null
    };
    // Prefer the first entry for a name/code; this avoids duplicate map-unit records
    // distorting the ranking.
    if (!rowsByKey.has(mainKey)) rowsByKey.set(mainKey, row);
  }
  const rows = Array.from(rowsByKey.values());
  const populationRows = rows.filter(r => r.population !== null).sort((a, b) => b.population - a.population);
  const areaRows = rows.filter(r => r.area !== null).sort((a, b) => b.area - a.area);
  populationRows.forEach((row, i) => row.populationRank = { rank: i + 1, total: populationRows.length });
  areaRows.forEach((row, i) => row.areaRank = { rank: i + 1, total: areaRows.length });
  worldInfoRankIndex = new Map();
  for (const row of rows) {
    const ranks = { population: row.populationRank, area: row.areaRank };
    for (const key of row.keys) if (!worldInfoRankIndex.has(key)) worldInfoRankIndex.set(key, ranks);
  }
}
function csvSplitLine(line) {
  const out = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      out.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  out.push(cur);
  return out;
}
function unWppKeysForFeature(feature) {
  return worldInfoRankKeysForFeature(feature);
}
function isUKHomeWorldInfoFeature(feature) {
  const p = (feature && feature.properties) || {};
  const nameKey = norm(displayName(p));
  const sovereignKey = norm(prop(p, ['SOVEREIGNT']));
  const statusKey = norm(prop(p, ['QUIZ_STATUS']) || prop(p, ['TYPE']));
  return ['ENGLAND', 'SCOTLAND', 'WALES', 'NORTHERNIRELAND'].includes(nameKey)
    && (sovereignKey === 'UNITEDKINGDOM' || statusKey.includes('UNITEDKINGDOM'));
}
function unWppPopulationForFeature(feature) {
  if (!unWppPopulationLoaded) return null;
  // In World mode the UK home countries are deliberately treated as separate
  // game/aesthetic entities. UN WPP does not list England, Scotland, Wales or
  // Northern Ireland separately, so do not let their inherited GBR/UK source
  // codes pull in the full United Kingdom population.
  if (isUKHomeWorldInfoFeature(feature)) return null;
  for (const key of unWppKeysForFeature(feature)) {
    const row = unWppPopulationIndex.get(key);
    if (row) return row;
  }
  return null;
}
function unWppRankText(row) {
  if (!row || !row.rank) return '';
  return `${row.rank} of ${row.total}`;
}
function indexUnWppRow(row) {
  const keys = [row.entity, row.code].map(norm).filter(Boolean);
  const alias = UN_WPP_ENTITY_ALIASES[norm(row.entity)];
  if (alias) for (const a of alias) keys.push(norm(a));
  for (const key of Array.from(new Set(keys))) {
    if (key && !unWppPopulationIndex.has(key)) unWppPopulationIndex.set(key, row);
  }
}
async function loadUnWppPopulationData() {
  if (unWppPopulationLoaded || unWppPopulationLoading) return;
  unWppPopulationLoading = true;
  unWppPopulationError = false;
  try {
    let latest = null;
    let latestYear = null;
    try {
      const localRes = await fetch(UN_WPP_POPULATION_LOCAL_JSON_URL, { cache: 'force-cache' });
      if (localRes.ok) {
        const data = await localRes.json();
        const year = Number(data && data.year);
        const rows = Array.isArray(data && data.rows) ? data.rows : [];
        const cleaned = rows
          .map(r => ({ entity: String((r && r.entity) || ''), code: String((r && r.code) || ''), year: year, population: Number(r && r.population) }))
          .filter(r => r.entity && r.code && Number.isFinite(r.population) && r.population > 0);
        if (Number.isFinite(year) && cleaned.length) { latest = cleaned; latestYear = year; }
      }
    } catch (localErr) {
      // Local snapshot unavailable — fall through to the full OWID CSV below.
    }
    if (!latest) {
      const res = await fetch(UN_WPP_POPULATION_CSV_URL, { cache: 'force-cache' });
      if (!res.ok) throw new Error('UN WPP population CSV could not be loaded');
      const text = await res.text();
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      const header = csvSplitLine(lines.shift() || '');
      const entityIdx = header.findIndex(h => /^Entity$/i.test(h));
      const codeIdx = header.findIndex(h => /^Code$/i.test(h));
      const yearIdx = header.findIndex(h => /^Year$/i.test(h));
      let popIdx = header.findIndex(h => /population/i.test(h) && !/density/i.test(h));
      if (popIdx < 0) popIdx = header.length - 1;
      const parsed = [];
      for (const line of lines) {
        const cells = csvSplitLine(line);
        const entity = cells[entityIdx] || '';
        const code = cells[codeIdx] || '';
        const year = Number(cells[yearIdx]);
        const population = Number(String(cells[popIdx] || '').replace(/,/g, ''));
        if (!entity || !code || /^OWID_/i.test(code) || !Number.isFinite(year) || !Number.isFinite(population) || population <= 0) continue;
        parsed.push({ entity, code, year, population });
      }
      latestYear = -Infinity;
      for (const r of parsed) if (r.year > latestYear) latestYear = r.year;
      latest = parsed.filter(r => r.year === latestYear);
    }
    latest.sort((a, b) => b.population - a.population);
    unWppPopulationIndex = new Map();
    latest.forEach((row, i) => {
      row.rank = i + 1;
      row.total = latest.length;
      indexUnWppRow(row);
    });
    unWppPopulationYear = String(latestYear);
    unWppPopulationLoaded = true;
    if (infoWidgetSelection && infoWidgetSelection.mode === 'world') updateInfoWidget();
  } catch (err) {
    console.warn('UN WPP population data could not be loaded', err);
    unWppPopulationError = true;
    if (infoWidgetSelection && infoWidgetSelection.mode === 'world') updateInfoWidget();
  } finally {
    unWppPopulationLoading = false;
  }
}

function buildWorldFeatureInfo(feature) {
  const p = (feature && feature.properties) || {};
  const name = displayName(p);
  const dependency = isDependencyLike(p);
  const capital = findCapital(p) || findQuizCapital(p) || 'not listed';
  const unRow = unWppPopulationForFeature(feature);
  const population = unRow ? unRow.population : null;
  const areaKm2 = infoAreaValue(feature, p);
  const density = Number.isFinite(population) && population > 0 && Number(areaKm2) > 0 ? Math.round(population / Number(areaKm2)) : '';
  const admin = prop(p, ['ADMIN']);
  const sovereign = prop(p, ['SOVEREIGNT']);
  const controller = (admin && norm(admin) !== norm(name)) ? admin : ((sovereign && norm(sovereign) !== norm(name)) ? sovereign : '');
  const ranks = worldInfoRanksForFeature(feature);
  const facts = [];
  addInfoFact(facts, dependency || isIslandishName(name) ? 'Capital / main settlement' : 'Capital City', capital);
  if (unWppPopulationLoaded) {
    addInfoFact(facts, 'Population', unRow ? infoNumber(population) : 'Not listed in UN WPP');
    addInfoFact(facts, 'Rank by population', unWppRankText(unRow));
  } else if (unWppPopulationError) {
    addInfoFact(facts, 'Population', 'UN WPP data unavailable');
  } else {
    addInfoFact(facts, 'Population', 'Loading UN WPP data…');
  }
  addInfoFact(facts, 'Area', areaKm2 ? `${Number(areaKm2).toLocaleString()} km²` : '');
  addInfoFact(facts, 'Rank by area', formatWorldInfoRank(ranks.area));
  addInfoFact(facts, 'Population density', density ? `c. ${Number(density).toLocaleString()} people/km²` : '');
  addInfoFact(facts, 'Sovereign state', controller);
  const popSource = unWppPopulationLoaded ? `Population: UN World Population Prospects ${unWppPopulationYear || ''}.` : 'Population: UN World Population Prospects.';
  return {
    shortName: name,
    heading: name,
    note: `${popSource} Area is calculated from the map geometry for game purposes. Click another country or territory to update this panel.`,

}

function buildSubgameFeatureInfo(mode, feature) {
  const p = (feature && feature.properties) || {};
  if (mode === 'us-states') {
    const name = stateName(p) || 'Unknown state';
    const info = stateInfoForName(name) || {};
    const facts = [];
    addInfoFact(facts, 'Capital', info.capital);
    addInfoFact(facts, 'Nickname', info.nickname);
    addInfoFact(facts, 'Type', info.nonState ? 'Federal district' : 'US state');
    return { shortName: name, heading: name, note: 'Click another state to update this panel.', cards: [{ title: 'USA map information', facts }] };
  }
  if (mode === 'canada-provinces') {
    const raw = canadaProvinceName(p) || 'Unknown province/territory';
    const info = canadaProvinceInfoForName(raw) || {};
    const name = info.display || raw;
    const facts = [];
    addInfoFact(facts, 'Capital', info.capital);
    addInfoFact(facts, 'Type', info.type === 'territory' ? 'Canadian territory' : 'Canadian province');
    return { shortName: name, heading: name, note: 'Click another province or territory to update this panel.', cards: [{ title: 'Canada map information', facts }] };
  }
  if (mode === 'ireland-counties') {
    const raw = irelandCountyRawName(p);
    const name = irelandCountyDisplayName(feature);
    const info = irelandCountyInfoForName(raw) || {};
    const facts = [];
    addInfoFact(facts, 'Administrative town/city', info.town);
    addInfoFact(facts, 'Province', prop(p, ['PROVINCE','Province','province']) || info.province);
    addInfoFact(facts, 'Jurisdiction', info.jurisdiction);
    addInfoFact(facts, 'Note', info.note);
    return { shortName: name, heading: name, note: 'Click another county to update this panel.', cards: [{ title: 'Ireland county information', facts }] };
  }
  if (mode === 'england-counties' || mode === 'scotland-counties' || mode === 'wales-counties') {
    const raw = regionalCountyRawNameForMode(mode, p);
    const name = regionalCountyDisplayName(mode, feature);
    const info = regionalCountyInfoForName(mode, raw) || {};
    const facts = [];
    addInfoFact(facts, 'Administrative town/city', info.town);
    addInfoFact(facts, 'Map mode', REGIONAL_MODE_TITLES[mode]);
    addInfoFact(facts, 'Type', mode === 'wales-counties' ? 'Principal area' : (info.note || quizPlaceKindForMode(mode)));
    return { shortName: name, heading: name, note: 'Click another area to update this panel.', cards: [{ title: 'Local map information', facts }] };
  }
  return buildWorldFeatureInfo(feature);
}
function buildInfoWidgetData() {
  if (infoWidgetSelection && infoWidgetSelection.feature) {
    const mode = infoWidgetSelection.mode || mapMode;
    return mode === 'world' ? buildWorldFeatureInfo(infoWidgetSelection.feature) : buildSubgameFeatureInfo(mode, infoWidgetSelection.feature);
  }
  return MAP_MODE_INFO[mapMode] || MAP_MODE_INFO.world;
}
function setInfoWidgetSelection(mode, feature, expand=false) {
  if (!feature) return;
  infoWidgetSelection = { mode: mode || mapMode, feature };
  // Do not force this panel open. The user controls visibility by opening/collapsing it.
  updateInfoWidget();
}
function clearInfoWidgetSelection() {
  infoWidgetSelection = null;
}
function updateInfoWidget() {
  const widget = document.getElementById('country-info-widget');
  const toggle = document.getElementById('country-info-toggle');
  const body = document.getElementById('country-info-body');
  if (!widget || !toggle || !body) return;
  const info = buildInfoWidgetData();
  const collapsed = widget.classList.contains('collapsed');
  const shortName = info.shortName || info.heading || 'this map';
  toggle.textContent = collapsed ? `Click to learn about ${shortName}.` : `Hide ${info.heading} information`;
  toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
  const cards = infoCardsHtml(info.cards || []);
  body.innerHTML = `<h2 class="country-info-title">${esc(info.heading)}</h2>${cards}<p class="country-info-note">${esc(info.note || 'Click a country or area to update this panel.')}</p>`;
}

async function loadJsonFile(file) {

      if (!response.ok) throw new Error(response.status + ' ' + response.statusText);
      return await response.json();
    } catch (err) { lastErr = err; }
  }
  throw new Error(file + ' could not be loaded: ' + (lastErr ? lastErr.message : 'unknown error'));
}
function knownIrelandCountyCount(fc) {

  if (!fc || !Array.isArray(fc.features)) return 0;
  for (const f of fc.features) {
    const raw = irelandCountyRawName((f && f.properties) || {});
    if (raw && irelandCountyInfoForName(raw)) seen.add(irelandCountyKey(raw));
  }
  return seen.size;
}
async function fetchGeoJsonUrl(url) {
  const response = await fetch(url, {cache: 'force-cache'});
  if (!response.ok) throw new Error(response.status + ' ' + response.statusText);
  const data = await response.json();
  if (!data || !Array.isArray(data.features) || !data.features.length) throw new Error('no features found');
  return data;
}

function regionalCountyCompletenessScore(fc) {
  if (!fc || !Array.isArray(fc.features)) return { score: 0, counts: {} };
  const counts = {};
  let score = 0;
  for (const mode of ['england-counties','scotland-counties','wales-counties']) {

function ensureShpJs() {
  if (window.shp) return Promise.resolve(window.shp);
  if (window._shpJsPromise) return window._shpJsPromise;
  window._shpJsPromise = new Promise(function(resolve, reject) {
    let i = 0;
    function next() {
      if (i >= SHPJS_URLS.length) { reject(new Error('shpjs could not be loaded')); return; }
      const script = document.createElement('script');
      script.src = SHPJS_URLS[i++];
      script.onload = function() {
        if (window.shp) resolve(window.shp);
        else if (i < SHPJS_URLS.length) next();
        else reject(new Error('shpjs loaded but did not initialise'));
      };
      script.onerror = function() { if (i < SHPJS_URLS.length) next(); else reject(new Error('shpjs could not be loaded')); };
      document.head.appendChild(script);
    }
    next();
  });
  return window._shpJsPromise;
}

function flattenGeoJsonResult(result) {
  const features = [];
  function walk(x) {
    if (!x) return;
    if (x.type === 'FeatureCollection' && Array.isArray(x.features)) { features.push(...x.features); return; }
    if (x.type === 'Feature' && x.geometry) { features.push(x); return; }
    if (Array.isArray(x)) { x.forEach(walk); return; }
    if (typeof x === 'object') Object.values(x).forEach(walk);
  }
  walk(result);
  return { type: 'FeatureCollection', features: features.filter(function(f) { return f && f.geometry; }) };
}

async function fetchShapefileZipGeoJson(url) {
  const shp = await ensureShpJs();
  const result = await shp(url);
  return flattenGeoJsonResult(result);
}

function dedupeCountyFeatures(mode, features) {
  const out = [], seen = new Set();
  for (const f of (features || [])) {
    const raw = mode === 'ireland-counties' ? irelandCountyRawName((f && f.properties) || {}) : regionalCountyRawNameForMode(mode, (f && f.properties) || {});
    const key = mode === 'ireland-counties' ? irelandCountyKey(raw) : normCountyKey(raw);
    if (!key || seen.has(key)) continue;
    if (mode === 'ireland-counties' ? !irelandCountyInfoForName(raw) : !regionalCountyInfoForName(mode, raw)) continue;
    seen.add(key); out.push(f);
  }
  return out;
}

    addWorldSpecialMapAnnotations();
    addCanaryIslandsHelperMarker();
    map.on('zoomend', updateHelperVisibility);
    updateHelperVisibility();
    applyMapMode(false);
    document.getElementById('spinner').style.display = 'none';
    scheduleDeferredMapDataLoad();
  } catch (err) {
    console.error(err);
    showFatal('The core world map data could not be loaded. This file needs an internet connection for Leaflet and Natural Earth country, territory, capital and tiny-island data. ' + err.message);
  }
}

</script>
<script>
(function loadLeaflet() {
  const sources = [
    'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
    'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js'
  ];
  let i = 0;
  function next() {
    const s = document.createElement('script');
    s.src = sources[i++];
    s.onload = function() { window.__leafletReady = true; startQuizMap(); };
    s.onerror = function() { if (i < sources.length) next(); else showFatal('Leaflet could not be loaded. Please open this file with an internet connection.'); };
    document.head.appendChild(s);
  }
  next();
})();
</script>

<script>
(function setupIntroOverlay() {
  const button = document.getElementById('intro-let-go');
  const overlay = document.getElementById('intro-overlay');
  if (!button || !overlay) return;
  button.addEventListener('click', function() {
    overlay.classList.add('intro-hidden');
  });
})();

(function setupQuizKeyboardShortcuts() {
  document.addEventListener('keydown', function(e) {
    if (!quizState) return;
    if (e.altKey || e.ctrlKey || e.metaKey) return;
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable)) return;
    if (e.key >= '1' && e.key <= '4') {
      const btns = document.querySelectorAll('#quiz-options .quiz-choice-btn:not([disabled])');
      const btn = btns[Number(e.key) - 1];
      if (btn) { e.preventDefault(); btn.click(); }
      return;
    }
    if (e.key === 'Enter' || e.key === ' ') {
      // A focused button already handles Enter/Space natively — don't double-fire.
      if (t && t.tagName === 'BUTTON') return;
      const primary = document.querySelector('#quiz-actions .quiz-mini-btn.primary');
      if (primary && !primary.disabled) { e.preventDefault(); primary.click(); }
    }
  });
})();
</script>
